<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Arial;
background:#1a73e8;
color:white;
text-align:center;
}

h1{
margin-top:40px;
}

#q{
margin-top:50px;
font-size:28px;
}

.grid{

margin:60px auto;
width:700px;
display:grid;

grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;

gap:20px;
}

.btn{

height:150px;
font-size:22px;
border-radius:20px;
border:none;
cursor:pointer;
color:white;
font-weight:bold;

}

.btn:hover{
transform:scale(1.05);
}

/* màu kahoot style */

.red{background:#e21b3c;}
.blue{background:#1368ce;}
.yellow{background:#d89e00;}
.green{background:#26890c;}

</style>

</head>

<body>

<h1>Mini Quiz</h1>

<h2 id="q"></h2>

<div class="grid" id="answers"></div>

<script>

let params=new URLSearchParams(window.location.search)
let id=params.get("id")

let quiz=[

{
q:"Ngày Quốc tế Phụ nữ là ngày nào?",
a:["8/3","20/10","1/6","2/9"],
c:0
},

{
q:"PTNK thuộc đại học nào?",
a:["ĐHQG HCM","Bách Khoa","KHTN","UEH"],
c:0
}

]

let i=0

function show(){

let q=quiz[i]

document.getElementById("q").innerText=q.q

let html=""

let colors=["red","blue","yellow","green"]

for(let j=0;j<4;j++){

html+=`<button class="btn ${colors[j]}" onclick="ans(${j})">${q.a[j]}</button>`

}

document.getElementById("answers").innerHTML=html

}

function ans(x){

i++

if(i<quiz.length){

show()

}else{

window.location="wish.html?id="+id

}

}

show()

</script>

</body>
</html>
