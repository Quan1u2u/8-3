<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>

body{
font-family:"Times New Roman";
background:white;
text-align:center;
}

.grid{
width:700px;
margin:60px auto;

display:grid;

grid-template-columns:1fr 1fr;
gap:20px;
}

.btn{

height:140px;

border:none;

border-radius:20px;

font-size:22px;

color:white;

cursor:pointer;

}

.red{background:#e21b3c;}
.blue{background:#1368ce;}
.yellow{background:#d89e00;}
.green{background:#26890c;}

</style>

</head>

<body>

<h2 id="q"></h2>

<div class="grid" id="answers"></div>

<script>

let params=new URLSearchParams(window.location.search)

let id=params.get("id")
let i=params.get("q") || 0

let quiz=[

{
q:"Ngày Quốc tế Phụ nữ là ngày nào?",
a:["8/3","20/10","1/6","2/9"],
c:0
},

{
q:"PTNK thuộc đại học nào?",
a:["ĐHQG-HCM","Bách Khoa","KHTN","UEH"],
c:0
}

]

let question=quiz[i]

document.getElementById("q").innerText=question.q

let colors=["red","blue","yellow","green"]

let html=""

for(let j=0;j<4;j++){

html+=`<button class="btn ${colors[j]}" onclick="answer(${j})">${question.a[j]}</button>`

}

document.getElementById("answers").innerHTML=html

function answer(x){

let correct=quiz[i].c

window.location=
"result.html?id="+id+
"&q="+i+
"&ans="+x+
"&correct="+correct

}

</script>

</body>
</html>
