<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Arial;
background:white;
color:black;
text-align:center;
}

.header{

display:flex;
justify-content:space-between;
align-items:center;

width:700px;
margin:40px auto;

}

/* timer */

.timer{

width:60px;
height:60px;

border-radius:50%;
border:5px solid #333;

display:flex;
align-items:center;
justify-content:center;

font-size:20px;
font-weight:bold;

}

/* số người trả lời */

.players{

font-size:18px;
}

/* câu hỏi */

#q{

font-size:28px;
margin-top:30px;

}

/* grid answers */

.grid{

margin:50px auto;
width:700px;

display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;

gap:20px;

}

/* button */

.btn{

height:140px;
font-size:22px;
border-radius:20px;
border:none;
cursor:pointer;
color:white;
font-weight:bold;

}

.red{background:#e21b3c;}
.blue{background:#1368ce;}
.yellow{background:#d89e00;}
.green{background:#26890c;}

/* result */

.result{

font-size:40px;
margin-top:30px;
font-weight:bold;

}

.correct{color:green;}
.wrong{color:red;}

</style>

</head>

<body>

<div class="header">

<div class="timer" id="time">10</div>

<div class="players" id="players">0 trả lời</div>

</div>

<h2 id="q"></h2>

<div class="grid" id="answers"></div>

<div id="result" class="result"></div>

<script>

let params=new URLSearchParams(window.location.search)
let id=params.get("id")

let score=0
let answered=0

let quiz=[

{
q:"Ngày Quốc tế Phụ nữ là ngày nào?",
a:["8/3","20/10","1/6","2/9"],
c:0
},

{
q:"PTNK thuộc đại học nào?",
a:["ĐHQG HCM","Bách Khoa","KHTN","UEH"],
c:0
}

]

let i=0

let timer=10
let interval

function startTimer(){

timer=10

document.getElementById("time").innerText=timer

interval=setInterval(()=>{

timer--

document.getElementById("time").innerText=timer

if(timer==0){

clearInterval(interval)
next()

}

},1000)

}

function show(){

document.getElementById("result").innerText=""

answered=0

let q=quiz[i]

document.getElementById("q").innerText=q.q

let colors=["red","blue","yellow","green"]

let html=""

for(let j=0;j<4;j++){

html+=`<button class="btn ${colors[j]}" onclick="ans(${j})">${q.a[j]}</button>`

}

document.getElementById("answers").innerHTML=html

startTimer()

}

function ans(x){

clearInterval(interval)

answered++

document.getElementById("players").innerText=answered+" trả lời"

if(x==quiz[i].c){

score+=100

document.getElementById("result").innerText="Correct"
document.getElementById("result").className="result correct"

}else{

document.getElementById("result").innerText="Incorrect"
document.getElementById("result").className="result wrong"

}

setTimeout(next,1500)

}

function next(){

i++

if(i<quiz.length){

show()

}else{

let board=JSON.parse(localStorage.getItem("board")||"[]")

board.push({user:id,score:score})

localStorage.setItem("board",JSON.stringify(board))

window.location="leaderboard.html?id="+id

}

}

show()

</script>

</body>
</html>
