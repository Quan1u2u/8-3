<!DOCTYPE html>
<html>

<head>

<style>

body{

font-family:Arial;
text-align:center;
background:white;

}

table{

margin:40px auto;
border-collapse:collapse;
width:400px;
font-size:20px;

}

th,td{

padding:12px;
border-bottom:1px solid #ccc;

}

</style>

</head>

<body>

<h1>🏆 Leaderboard</h1>

<table>

<tr>
<th>Rank</th>
<th>User</th>
<th>Score</th>
</tr>

<tbody id="board"></tbody>

</table>

<button onclick="go()">Tiếp tục</button>

<script>

let params=new URLSearchParams(window.location.search)
let id=params.get("id")

let data=JSON.parse(localStorage.getItem("board")||"[]")

data.sort((a,b)=>b.score-a.score)

let html=""

for(let i=0;i<data.length;i++){

html+=`

<tr>

<td>${i+1}</td>
<td>${data[i].user}</td>
<td>${data[i].score}</td>

</tr>

`

}

document.getElementById("board").innerHTML=html

function go(){

window.location="wish.html?id="+id

}

</script>

</body>
</html>
