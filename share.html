<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Share</title>

<style>

body{

margin:0;
font-family:"Times New Roman";

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:url("img/bg_ptnk.jpg");
background-size:cover;
background-position:center;

}

/* container */

.box{

background:rgba(255,255,255,0.9);

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,0.3);

}

/* logo */

.logo{

width:120px;
margin-bottom:10px;

}

/* qr */

.qr{

width:220px;
margin:20px 0;

}

/* link */

.link{

font-size:18px;

background:#f3f3f3;

padding:10px;

border-radius:10px;

}

/* nút ảnh */

.enter-btn{

width:200px;

position:fixed;

bottom:30px;

right:30px;

cursor:pointer;

transition:0.3s;

}

.enter-btn:hover{

transform:scale(1.1);

}

.avatar{
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<img src="img/logo1.png" class="logo">

<h2>Quét QR để truy cập</h2>

<img src="img/qr.png" class="qr">

<p>Hoặc truy cập link:</p>

<div class="link">
https://tin2528.ddns.net
</div>

<br>

<img src="img/enter.png" class="enter-btn" onclick="goWish()">

</div>

<script>

function getParam(name){
let url = new URL(window.location.href);
return url.searchParams.get(name);
}

function goWish(){

let user = getParam("id")

window.location="wish.html?id="+user

}
  
</script>

</body>
</html>
