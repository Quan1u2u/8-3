<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Share</title>

<style>

body{

margin:0;
font-family:"Times New Roman";

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:url("img/bg_share.jpg");
background-size:cover;
background-position:center;

}

/* container */

.box{

background:rgba(255,255,255,0.9);

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,0.3);

}

/* qr */

.qr{

width:220px;
margin:20px 0;

}

/* link */

.link{

font-size:18px;

background:#f3f3f3;

padding:10px;

border-radius:10px;

}

</style>

</head>

<body>

<div class="box">

<h2>Quét QR để truy cập</h2>

<img src="img/qr.png" class="qr">

<p>Hoặc truy cập link:</p>

<div class="link">
https://username.github.io/project
</div>

</div>

</body>
</html>
