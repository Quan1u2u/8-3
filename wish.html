<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lời chúc 8/3</title>

<style>

body{
    font-family: Arial;
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background-size:cover;
    background-position:center;
}

/* container chính */

.container{

    display:flex;
    align-items:center;
    gap:50px;

    background:rgba(255,255,255,0.9);
    padding:40px;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,0.25);

}

/* box lời chúc */

.text-box{

    max-width:400px;
}

.text-box h1{

    margin-bottom:20px;
}

.message{

    font-size:18px;
    line-height:1.6;
}

/* ảnh */

.avatar{

    width:260px;
    height:320px;

    object-fit:cover;

    border-radius:20px;

    box-shadow:0 10px 25px rgba(0,0,0,0.3);

    transition:0.3s;

}

.avatar:hover{

    transform:scale(1.05);

}

</style>

</head>

<body>

<div class="container">

<div class="text-box">

<h1>💐 Chúc mừng 8/3</h1>

<div class="message" id="msg"></div>

</div>

<img id="img" class="avatar">

</div>

<script>

const data = {

"250201":{
img:"img/kan.jpg",
msg:"Chúc Khánh An – 'hót gơ 10 Tin' – luôn giữ được nụ cười rạng rỡ và năng lượng tích cực của mình. Mong rằng mỗi ngày của m đều đầy niềm vui, nhiều trải nghiệm thú vị và thật nhiều khoảnh khắc đáng nhớ. Chúc m có một ngày 8/3 thật xinh đẹp và rực rỡ như chính m 💐",
bg:"img/bg2.png"
},

"250233":{
img:"img/pq.jpg",
msg:"Chúc Phương Quỳnh – 'bà hoàng bi lắc' – lúc nào cũng tràn đầy năng lượng và tinh thần chiến thắng như khi đứng trước bàn bi lắc. Mong rằng m sẽ luôn tự tin, vui vẻ và đạt được thật nhiều thành công trong những điều mình theo đuổi. Chúc m 8/3 thật vui và thật nhiều tiếng cười 🌸",
bg:"img/bg2.png"
},

"250227":{
img:"img/pn.jpg",
msg:"Chúc Phương Nguyên – 'C.anh' – luôn giữ được sự dễ thương, vui vẻ và nguồn năng lượng tích cực của mình. Mong rằng mỗi ngày của m đều có thêm nhiều điều thú vị, nhiều kỷ niệm đẹp và những niềm vui nhỏ bé nhưng đáng nhớ. Chúc m một ngày 8/3 thật hạnh phúc 🌷",
bg:"img/bg2.png"
},

"250239":{
img:"img/mt.jpg",
msg:"Chúc Minh Thư – 'Tcon 10 năm' – luôn rạng rỡ, tự tin và tràn đầy năng lượng trong mọi việc mình làm. Mong rằng m sẽ luôn gặp nhiều may mắn, nhiều cơ hội tốt và thật nhiều niềm vui trong cuộc sống. Chúc m một ngày 8/3 thật đặc biệt và đáng nhớ 🌷",
bg:"img/bg2.png"
},

"250226":{
img:"img/ln.jpg",
msg:"Chúc Lam Ngọc – 'Lyna' – luôn xinh đẹp, tự tin và tỏa sáng theo cách riêng của mình. Mong rằng m sẽ luôn giữ được tinh thần tích cực, gặp nhiều may mắn và đạt được thật nhiều điều mình mong muốn. Chúc m một ngày 8/3 thật vui và tràn đầy năng lượng 🌸",
bg:"img/bg2.png"
},

"250209":{
img:"img/bhan.jpg",
msg:"Chúc Bảo Hân – 'lò vi sóng' – lúc nào cũng mang lại sự ấm áp, vui vẻ và năng lượng tích cực cho mọi người xung quanh. Mong rằng mỗi ngày của m đều có thật nhiều niềm vui, nhiều tiếng cười và những điều tốt đẹp. Chúc m một ngày 8/3 thật tuyệt vời 💐",
bg:"img/bg2.png"
}

};

function getParam(name){
let url = new URL(window.location.href);
return url.searchParams.get(name);
}

let id = getParam("id");

if(data[id]){

document.getElementById("img").src = data[id].img;

document.getElementById("msg").innerText = data[id].msg;

document.body.style.backgroundImage = `url(${data[id].bg})`;

}else{

document.getElementById("msg").innerText = "MSHS không tồn tại";

}

</script>

</body>
</html>
