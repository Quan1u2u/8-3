<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lời chúc 8/3</title>

<style>

body{
    font-family: Arial;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-size:cover;
    background-position:center;
}

/* layout bình thường */

.container{
    display:flex;
    align-items:center;
    gap:50px;
    background:rgba(255,255,255,0.9);
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.text-box{
    max-width:400px;
}

.message{
    font-size:18px;
    line-height:1.6;
}

.avatar{
    width:260px;
    height:320px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    transition:0.3s;
}

.avatar:hover{
    transform:scale(1.05);
}

/* layout riêng cho tập thể */

.group-container{
    width:700px;
    background:rgba(255,255,255,0.9);
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    padding:30px;
    text-align:center;
}

.group-img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:25px;
}

.group-msg{
    font-size:18px;
    line-height:1.6;
}

</style>
</head>

<body>

<!-- layout bình thường -->
<div class="container" id="normal">
    <div class="text-box">
        <h1>💐 Chúc mừng 8/3</h1>
        <div class="message" id="msg"></div>
    </div>
    <img id="img" class="avatar">
</div>

<!-- layout tập thể -->
<div class="group-container" id="group" style="display:none">
    <h1>🌸 Chúc mừng 8/3 - 10 Tin 🌸</h1>
    <img id="group-img" class="group-img">
    <div id="group-msg" class="group-msg"></div>
</div>

<script>

const data = {

"Khánh An":{
img:"img/kan.jpg",
msg:"Chúc Khánh An luôn rạng rỡ và tràn đầy năng lượng. Chúc m có một ngày 8/3 thật xinh đẹp 💐",
bg:"img/bg2.png"
},

"Phương Quỳnh":{
img:"img/pq.jpg",
msg:"Chúc Phương Quỳnh luôn vui vẻ, tự tin và đạt nhiều thành công 🌸",
bg:"img/bg2.png"
},

"Tập thể":{
img:"img/tapthe.jpg",
msg:"Chúc toàn thể các bạn nữ lớp 10 Tin một ngày 8/3 thật vui vẻ, luôn xinh đẹp, tự tin và tràn đầy năng lượng. Mong rằng mỗi ngày của các bạn đều có thật nhiều niềm vui và những khoảnh khắc đáng nhớ 💐",
bg:"img/bg2.png"
}

};

function getParam(name){
let url = new URL(window.location.href);
return url.searchParams.get(name);
}

let id = getParam("id");

if(data[id]){

document.body.style.backgroundImage = `url(${data[id].bg})`;

if(id === "Tập thể"){

document.getElementById("normal").style.display = "none";
document.getElementById("group").style.display = "block";

document.getElementById("group-img").src = data[id].img;
document.getElementById("group-msg").innerText = data[id].msg;

}else{

document.getElementById("img").src = data[id].img;
document.getElementById("msg").innerText = data[id].msg;

}

}else{

document.getElementById("msg").innerText = "SAI rồi";

}

</script>

</body>
</html>
