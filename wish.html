<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lời chúc 8/3</title>

<style>

body{
    font-family: Arial;
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background-size:cover;
    background-position:center;
}

/* container chính */

.container{

    display:flex;
    align-items:center;
    gap:40px;

    background:rgba(255,255,255,0.9);
    padding:40px;
    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,0.2);

}

/* box lời chúc */

.text-box{

    max-width:350px;
}

.text-box h1{

    margin-bottom:20px;
}

.message{

    font-size:18px;
    line-height:1.6;
}

/* ảnh */

.avatar{

    width:220px;
    height:220px;

    object-fit:cover;

    border-radius:50%;

    border:6px solid #ff6b9a;

}

</style>

</head>

<body>

<div class="container">

<div class="text-box">

<h1>💐 Chúc mừng 8/3</h1>

<div class="message" id="msg"></div>

</div>

<img id="img" class="avatar">

</div>

<script>

const data={

"1001":{
img:"img/lan.jpg",
msg:"Chúc Lan luôn xinh đẹp, hạnh phúc và thành công trong công việc 💐",
bg:"img/bg1.jpg"
},

"1002":{
img:"img/mai.jpg",
msg:"Chúc Mai luôn tràn đầy năng lượng và luôn tỏa sáng 🌸",
bg:"img/bg2.jpg"
},

"1003":{
img:"img/linh.jpg",
msg:"Chúc Linh luôn vui vẻ và có thật nhiều khoảnh khắc đáng nhớ 🌷",
bg:"img/bg3.jpg"
}

};

function getParam(name){
let url=new URL(window.location.href);
return url.searchParams.get(name);
}

let id=getParam("id");

if(data[id]){

document.getElementById("img").src=data[id].img;

document.getElementById("msg").innerText=data[id].msg;

document.body.style.backgroundImage=`url(${data[id].bg})`;

}else{

document.getElementById("msg").innerText="MSHS không tồn tại";

}

</script>

</body>
</html>
